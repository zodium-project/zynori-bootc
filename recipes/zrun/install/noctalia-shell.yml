---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
          - cliphist
          - wtype
          - fastfetch
          - noctalia-qs
          - noctalia-shell
          - nwg-look
          - evolution-data-server
          - breeze-cursor-theme
          - papirus-icon-theme
          - papirus-icon-theme-dark

  - type: script
    snippets:
          - |
            mkdir -p /etc/zodium /etc/zodium/Papirus /etc/zodium/Papirus-Dark
            mv /usr/share/icons/Papirus/* /etc/zodium/Papirus/
            mv /usr/share/icons/Papirus-Dark/* /etc/zodium/Papirus-Dark/
            ln -s /etc/zodium/Papirus /usr/share/icons/Papirus
            ln -s /etc/zodium/Papirus-Dark /usr/share/icons/Papirus-Dark