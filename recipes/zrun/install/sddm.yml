---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
       - sddm
       - sddm-wayland-generic
       - qt6-qtvirtualkeyboard
       - kwin_wayland
       - qt6-qtmultimedia
       - qt6-qtsvg
       - qt6-qtquickcontrols2
       - qt6-qtdeclarative

  - type: script
    snippets:
        - "systemctl enable sddm.service"
        - "mkdir -p /etc/sddm/themes/zydm"
        - "git clone --depth 1 https://github.com/zodium-project/zydm-theme.git /etc/sddm/themes/zydm/"
        - "rm -rf /etc/sddm/themes/zydm/.git/ /etc/sddm/themes/zydm/LICENSE /etc/sddm/themes/zydm/THIRD_PARTY_LICENSE"