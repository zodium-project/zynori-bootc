---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    install:
      install-weak-deps: false
      packages:
       - sddm
       - sddm-wayland-generic
       - qt6-qtvirtualkeyboard
       - qt6-qtmultimedia
       - qt6-qtsvg

  - type: script
    snippets:
        - "systemctl enable sddm.service"