---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: dnf
    repos:
      copr:
        - scottames/ghostty
        - ublue-os/packages
    install:
      install-weak-deps: false
      packages:
          - nautilus
          - nautilus-python
          - glycin-thumbnailer
          - glycin-gtk4-libs
          - ffmpegthumbnailer
          - seahorse
          - bazaar
          - file-roller
          - ghostty
          - helium-drm
          - gnome-characters
          - gnome-disk-utility
          - system-config-printer
          - input-remapper

  - type: script
    snippets:
        - "dnf -y copr disable scottames/ghostty"
        - "dnf -y copr disable ublue-os/packages"
        - "rm -rf /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:scottames:ghostty.repo"
        - "rm -rf /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:ublue-os:packages.repo"
        - "rm -rf /usr/lib64/firefox/browser/defaults/preferences/firefox-redhat-default-prefs.js"
        - "rm -rf /usr/lib/firefox/browser/defaults/preferences/firefox-redhat-default-prefs.js"
        - "rm -rf /usr/lib64/firefox/distribution/"
