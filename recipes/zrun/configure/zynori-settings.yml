---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
 - type: files
   files:
     - source: base-files
       destination: /

     - source: niri-settings
       destination: /

 - type: script
   snippets:
     - |
       rm -f /usr/share/applications/btop.desktop
       rm -f /usr/share/applications/kbd-layout-viewer5.desktop
       rm -f /usr/share/applications/nvim.desktop
       rm -f /usr/share/applications/nwg-look.desktop
       systemctl enable papirus-accent.service

 - type: script
   snippets:
     - |
       sed -i 's|property string defaultWallpapersDirectory: Quickshell.env("HOME") + "/Pictures/Wallpapers"|property string defaultWallpapersDirectory: "/usr/share/wallpapers"|' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property string barType: "simple"/property string barType: "framed"/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property string position: "top" \/\/ "top", "bottom", "left", or "right"/property string position: "left" \/\/ "top", "bottom", "left", or "right"/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property bool showCapsule: true/property bool showCapsule: false/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property real backgroundOpacity: 0.93/property real backgroundOpacity: 1.0/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property real dimmerOpacity: 0.2/property real dimmerOpacity: 0.3/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property bool lockScreenAnimations: false/property bool lockScreenAnimations: true/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property bool enableBlurBehind: true/property bool enableBlurBehind: false/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property string shadowDirection: "bottom_right"/property string shadowDirection: "center"/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property bool showChangelogOnStartup: true/property bool showChangelogOnStartup: false/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/adapter.ui.fontDefault = Qt.application.font.family/adapter.ui.fontDefault = "Cantarell"/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/adapter.ui.fontFixed = "monospace"/adapter.ui.fontFixed = "Hack Nerd Font Mono"/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property bool scrollbarAlwaysVisible: true/property bool scrollbarAlwaysVisible: false/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property real panelBackgroundOpacity: 0.93/property real panelBackgroundOpacity: 1.0/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property bool autoLocate: false/property bool autoLocate: true/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property bool overviewEnabled: false/property bool overviewEnabled: true/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property string terminalCommand: "alacritty -e"/property string terminalCommand: "ghostty -e"/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i 's/property bool disableWallpaper: true/property bool disableWallpaper: false/' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml
       sed -i '/\/\/ dock/{n; n; s/property bool enabled: true/property bool enabled: false/}' /etc/xdg/quickshell/noctalia-shell/Commons/Settings.qml