---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
 - type: script
   snippets:
      - |
        dnf config-manager addrepo --from-repofile=https://zodium-project.github.io/repo/zodium-pkgs.repo
        dnf config-manager setopt zodium-pkgs.enabled=1
        dnf config-manager setopt zodium-pkgs.priority=90
        dnf --refresh makecache